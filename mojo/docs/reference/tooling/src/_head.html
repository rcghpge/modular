<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} · Mojo cheat sheet</title>
<style>
  :root{
    /* neutrals: Twilight */
    --ink:#181c1f; --muted:#676d71; --line:#e5e9ef; --bg:#ffffff;
    --code-bg:#f8f8f8; --code-line:#eef0f4;
    /* accent + backdrops: Ember (matches mojolang.org) */
    --accent:#c53713; --accent-soft:#fff7ee; --brand:#ff552a;
    /* syntax: brand tokens where defined, brand-adjacent for the extra categories */
    --c-comment:#676d86;  /* const-gray, readable in print */
    --c-kw:#5b66c0;       /* keyword: toned down from Nebula #637bff */
    --c-num:#9570ff;      /* number: purple */
    --c-str:#d6273a;      /* string: redder than brand pink #f44771 */
    --c-type:#0e7490;     /* type: teal; brand has no type token */
    --c-builtin:#b45309;  /* built-in: amber */
    --c-deco:#2e7d46;     /* decorator: green, kept clear of string-red */
    --c-op:#353d42;       /* operator: Twilight70 dark-gray */
    --c-lit:#9333ea;      /* True / False / None */
  }
  /* ---- dark mode (body.dark): Twilight surfaces + lightened syntax ---- */
  body.dark{
    --ink:#e5e9ef; --muted:#9aa0ab; --line:#353d42; --bg:#181c1f;
    --code-bg:#11161a; --code-line:#2b3238;
    --accent:#ff8f4d; --accent-soft:#2a201a; --brand:#ff552a;
    --c-comment:#8a90a0; --c-kw:#a6b0ec; --c-num:#ae92ff; --c-str:#f56b6b;
    --c-type:#5cc2d4; --c-builtin:#e9a44d; --c-deco:#5cc98a; --c-op:#aab0bb;
    --c-lit:#c08bff;
    background:#020c13;
  }
  html.dark{background:#020c13;}
  body.dark .panel{background:#1e242a;}
  body.dark table td,body.dark table.dec td{border-bottom-color:#2a3036;}
  body.dark .panel.tr h2{color:#5cc2d4;background:#15262b;}
  body.dark .panel.kw h2{color:#e3b341;background:#241f12;}
  body.dark .yes{color:#5cc98a;} body.dark .no{color:#ff7a85;} body.dark .mid{color:#e9a44d;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#eceef1;color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:11px;line-height:1.45;}
  .sheet{background:var(--bg);max-width:900px;margin:14px auto;padding:18px 20px 14px;}
  header{display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:2px solid var(--brand);padding-bottom:7px;margin-bottom:12px;}
  header h1{font-size:21px;margin:0;letter-spacing:-.01em;}
  .brand{display:flex;align-items:center;gap:9px;}
  .mark{width:30px;height:30px;flex:none;}
  header .sub{font-size:11px;color:var(--muted);}
  header .meta{font-size:9.5px;color:var(--muted);text-align:right;}
  .legend{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:9.5px;color:var(--muted);
    margin:-4px 0 12px;}
  .legend span b{font-weight:600;}
  .cols{column-count:2;column-gap:16px;}
  @media (max-width:840px){.cols{column-count:2;}}
  @media (max-width:560px){.cols{column-count:1;}}
  .panel{break-inside:avoid;margin:0 0 12px;border:1px solid var(--line);border-radius:6px;
    overflow:hidden;background:#fff;}
  .panel.wide{column-span:all;}
  .panel.colbreak{break-before:column;}
  .panel h2{font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:0;
    padding:5px 9px;color:var(--accent);background:var(--accent-soft);
    border-bottom:1px solid var(--line);font-weight:700;}
  .panel.tr h2{color:#0e7490;background:#ecfeff;}
  .panel.kw h2{color:#a16207;background:#fefce8;}
  .py ul{margin:2px 0 0;padding-left:1.1em;}
  .py li{margin:3px 0 4px;}
  .panel .body{padding:7px 9px 8px;}
  p.note{margin:6px 0 0;font-size:10px;color:var(--muted);}
  p.note b{color:var(--ink);font-weight:600;}
  .sublabel{margin:9px 0 3px;font-size:10px;font-weight:700;color:var(--ink);}
  .body > .sublabel:first-child{margin-top:0;}
  code{font-family:'Roboto Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:0.92em;
    background:var(--code-bg);border:1px solid var(--code-line);border-radius:3px;padding:0 2px;}
  p.lead{margin:0;font-size:11px;}
  p.lead b{color:var(--accent);}
  /* code blocks: wrap as a safety net: never scroll, never clip */
  pre{margin:0;background:var(--code-bg);border:1px solid var(--code-line);border-radius:5px;
    padding:6px 8px;
    font-family:'Roboto Mono',ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
    font-size:10px;line-height:1.5;
    white-space:pre-wrap;overflow-wrap:break-word;word-break:normal;}
  pre + pre{margin-top:6px;}
  pre .cl{display:block;padding-left:4em;text-indent:-4em;}
  pre .cl:empty::after{content:"\00a0";}
  /* tables: cells wrap rather than overflow the panel */
  table{border-collapse:collapse;width:100%;font-size:10px;}
  table td{padding:2px 6px 2px 0;vertical-align:top;border-bottom:1px solid #f0f1f3;
    white-space:normal;overflow-wrap:break-word;}
  table tr:last-child td{border-bottom:none;}
  table td:first-child{
    font-family:'Roboto Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--c-type);}
  table td.k:first-child{color:var(--c-kw);}
  table.dun td:first-child{color:var(--c-op);font-weight:600;}
  table.dun td{color:var(--c-type);}
  table.prec td:first-child{color:var(--c-num);font-weight:600;}
  table.ops td:first-child{color:var(--c-op);}
  table.ops td.k:first-child{color:var(--c-kw);}
  ol.rules{margin:2px 0 0;padding-left:16px;font-size:10px;}
  ol.rules li{margin:3px 0;}
  /* decision table */
  table.dec{font-size:10px;}
  table.dec th{text-align:left;padding:3px 8px 4px 0;border-bottom:2px solid var(--accent-soft);
    font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);}
  table.dec td{padding:4px 8px 4px 0;border-bottom:1px solid #f0f1f3;}
  table.dec td:first-child{color:var(--c-kw);font-weight:700;}
  .yes{color:#047857;font-weight:600;} .no{color:#b91c1c;font-weight:600;} .mid{color:#b45309;}
  /* token colors */
  .c{color:var(--c-comment);font-style:italic;}
  .k{color:var(--c-kw);font-weight:600;}
  .t{color:var(--c-type);}
  .b{color:var(--c-builtin);}
  .s{color:var(--c-str);}
  .n{color:var(--c-num);}
  .d{color:var(--c-deco);font-weight:600;}
  .l{color:var(--c-lit);font-weight:600;}
  .o{color:var(--c-op);}
  @page{size:letter;margin:0;}
  @media print{
    html,body{background:#fff;font-size:9.3px;}
    body.dark{background:#020c13;}
    .sheet{box-shadow:none;margin:0;max-width:none;padding:0.35in;}
    .cols{column-count:2;column-gap:12px;}
    .panel{break-inside:avoid;}
  }
</style>
</head>
