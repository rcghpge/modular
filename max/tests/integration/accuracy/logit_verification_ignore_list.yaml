# Ignore list for the Pipeline Logit Verification nightly runs.
#
# Add entries here for known-broken models so that they do not block the run
# from being considered regression-free. Every entry SHOULD have a ticket
# reference so it doesn't stay here indefinitely.
#
# Fields
#   model   HF model path, case-insensitive (required)
#   runner  Runner label to ignore (e.g. intel-gpu-b200, intel-gpu-8xb200).
#           If omitted, defaults to intel-gpu-b200 and intel-gpu-mi355 only.
#           Multi-GPU variants (intel-gpu-8xb200, intel-gpu-b200-multi,
#           intel-gpu-4xmi355, etc.) must be listed explicitly.
#   reason  Human-readable explanation (required)
#   ticket  Linear/GitHub ticket tracking the fix (optional but encouraged)
#
# Remove entries once the underlying bug is resolved.

ignored_failures:

  # ── nvidia/Kimi-K2.5-NVFP4 ───────────────────────────────────────────────
  - model: nvidia/Kimi-K2.5-NVFP4
    runner: intel-gpu-8xb200
    reason: "Excluded from logit verification on 8xB200"

  # ── deepseek-ai/DeepSeek-V3.2-Exp ─────────────────────────────────────────
  # KL divergence far exceeds threshold on 8xB200 (max_kl_div ~4.7 vs
  # threshold 0.39); numerical regression under investigation.
  - model: deepseek-ai/DeepSeek-V3.2-Exp
    runner: intel-gpu-8xb200
    reason: "Logit mismatch on 8xB200 (KL div ~4.7, threshold 0.39)"

  # ── amd/MiniMax-M2.7-MXFP4 ───────────────────────────────────────────────
  # KL divergence marginally exceeds threshold on 4xMI355 (max_kl_div ~1.57
  # vs threshold 1.5); borderline mismatch on AMD MXFP4 under investigation.
  - model: amd/MiniMax-M2.7-MXFP4
    runner: intel-gpu-4xmi355
    reason: "Logit mismatch on 4xMI355 (KL div ~1.57, threshold 1.5)"

  # ── black-forest-labs/FLUX.2-dev-NVFP4-t2i ────────────────────────────────
  # Image generation model; logit verification not yet supported for t2i
  # models on multi-GPU runners.
  - model: black-forest-labs/FLUX.2-dev-NVFP4-t2i
    runner: intel-gpu-b200-multi
    reason: "t2i logit verification not yet supported on intel-gpu-b200-multi"

  # ── olmo ──────────────────────────────────────────────────────────────────
  # No runner → defaults to intel-gpu-b200 + intel-gpu-mi355.
  - model: allenai/OLMo-1B-hf-float32
    reason: "Excluded from logit verification (olmo)"

  - model: allenai/OLMo-2-1124-7B-float32
    reason: "Excluded from logit verification (olmo)"

  - model: allenai/Olmo-3-7B-Instruct-bfloat16
    reason: "Excluded from logit verification (olmo)"

  - model: allenai/olmOCR-2-7B-1025-FP8
    reason: "Excluded from logit verification (olmo)"

  # ── phi ───────────────────────────────────────────────────────────────────
  # No runner → defaults to intel-gpu-b200 + intel-gpu-mi355.
  - model: microsoft/Phi-3.5-mini-instruct-bfloat16
    reason: "Excluded from logit verification (phi)"

  - model: microsoft/phi-4-bfloat16
    reason: "Excluded from logit verification (phi)"

  # ── exaone ────────────────────────────────────────────────────────────────
  # No runner → defaults to intel-gpu-b200 + intel-gpu-mi355.
  - model: LGAI-EXAONE/EXAONE-3.5-2.4B-Instruct-float32
    reason: "Excluded from logit verification (exaone)"

  # ── mistral ───────────────────────────────────────────────────────────────
  # No runner → defaults to intel-gpu-b200 + intel-gpu-mi355.
  - model: mistralai/Mistral-Nemo-Instruct-2407-bfloat16
    reason: "Excluded from logit verification (mistral)"

  - model: mistralai/Mistral-Small-3.1-24B-Instruct-2503-bfloat16
    reason: "Excluded from logit verification (mistral)"

  # ── pixtral ───────────────────────────────────────────────────────────────
  # No runner → defaults to intel-gpu-b200 + intel-gpu-mi355.
  - model: mistral-experimental/pixtral-12b-bfloat16
    reason: "Excluded from logit verification (pixtral)"
