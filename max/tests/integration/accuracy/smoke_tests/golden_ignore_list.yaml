# Golden-tag ignore list for the nightly MAX Serve smoke tests.
#
# Add entries here for known-broken models that should not block the nightly
# container from being tagged golden. Every entry SHOULD have a ticket reference
# so it doesn't stay here indefinitely.
#
# Fields
#   model   HF model path, case-insensitive (required)
#   gpu     Accelerator config to ignore: B200, MI355, 2xB200, 2xMI355,
#           4xMI355, 8xB200, 8xMI355, 8xB200_internal.
#           If omitted, defaults to B200 and MI355 only.
#           Multi-GPU variants (2x, 4x, 8x) must be listed explicitly.
#   reason  Human-readable explanation (required)
#   ticket  Linear/GitHub ticket tracking the fix (optional but encouraged)
#
# Remove entries once the underlying bug is resolved.
#
# Model names sourced from smoke_test_github_matrix.py @ main

ignored_failures:

  # ── phi ──────────────────────────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355 (the only configs these models run on).
  - model: microsoft/Phi-3.5-mini-instruct
    reason: "Excluded from golden gate (phi)"

  - model: microsoft/Phi-3.5-mini-instruct__modulev3
    reason: "Excluded from golden gate (phi)"

  - model: microsoft/phi-4
    reason: "Excluded from golden gate (phi)"

  - model: microsoft/phi-4__modulev3
    reason: "Excluded from golden gate (phi)"

  # ── mistral ───────────────────────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355.
  - model: mistralai/Mistral-Nemo-Instruct-2407
    reason: "Excluded from golden gate (mistral)"

  - model: mistralai/Mistral-Small-3.1-24B-Instruct-2503
    reason: "Excluded from golden gate (mistral)"

  # ── olmo ─────────────────────────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355.
  - model: allenai/Olmo-3-7B-Instruct
    reason: "Excluded from golden gate (olmo)"

  - model: allenai/olmOCR-2-7B-1025-FP8
    reason: "Excluded from golden gate (olmo)"

  # ── academic-ds ───────────────────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355.
  - model: ByteDance-Seed/academic-ds-9B
    reason: "Excluded from golden gate (academic-ds)"

  # ── qwen3-vl ─────────────────────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355.
  - model: Qwen/Qwen3-VL-4B-Instruct
    reason: "Excluded from golden gate (qwen3-vl)"

  - model: Qwen/Qwen3-VL-4B-Instruct-FP8
    reason: "Excluded from golden gate (qwen3-vl)"

  - model: Qwen/Qwen3-VL-30B-A3B-Thinking
    reason: "Excluded from golden gate (qwen3-vl)"

  - model: Qwen/Qwen3-VL-30B-A3B-Instruct-FP8
    reason: "Excluded from golden gate (qwen3-vl)"

  # ── stepfun-ai ────────────────────────────────────────────────────────────────
  # Explicit gpu: this model is excluded from single-card runners and runs only
  # on 8xB200.
  - model: stepfun-ai/Step-3.5-Flash
    gpu: 8xB200
    reason: "Excluded from golden gate (stepfun-ai)"

  # ── llama3-8B (all variants) ──────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355.  The KV-connector variants are also
  # excluded from MI355 in the matrix, so in practice they only fire on B200.
  - model: meta-llama/Llama-3.1-8B-Instruct
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__modulev3
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__eagle
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__dflash
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__local_kvconnector
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__eagle_local_kvconnector
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__tiered_kvconnector
    reason: "Excluded from golden gate (llama3-8B)"

  - model: meta-llama/Llama-3.1-8B-Instruct__debug_tiered_kvconnector
    reason: "Excluded from golden gate (llama3-8B)"

  # ── Kimi-K2.5-NVFP4 KV-connector variants ────────────────────────────────────
  # Explicit gpu: these variants are excluded from all single-card and 2x runners
  # and run only on 8xB200.
  - model: nvidia/Kimi-K2.5-NVFP4__local_kvconnector_tpep
    gpu: 8xB200
    reason: "Excluded from golden gate (Kimi-K2.5-NVFP4 KV-connector)"

  - model: nvidia/Kimi-K2.5-NVFP4__debug_tiered_kvconnector_tpep
    gpu: 8xB200
    reason: "Excluded from golden gate (Kimi-K2.5-NVFP4 KV-connector)"

  - model: nvidia/Kimi-K2.5-NVFP4__eagle_tiered_kvconnector_tpep
    gpu: 8xB200
    reason: "Excluded from golden gate (Kimi-K2.5-NVFP4 KV-connector)"

  - model: nvidia/Kimi-K2.5-NVFP4__mha_eagle_tiered_kvconnector_tpep
    gpu: 8xB200
    reason: "Excluded from golden gate (Kimi-K2.5-NVFP4 KV-connector)"

  # ── nvidia/Gemma-4 ───────────────────────────────────────────────────────────
  # No gpu → defaults to B200 + MI355.
  - model: nvidia/Gemma-4-31B-IT-NVFP4__tieredkv
    reason: "Tiered KV cache failure on Gemma-4-31B NVFP4"
    ticket: "MXSERV-131"

  # ── RedHatAI FP8 ─────────────────────────────────────────────────────────────
  # Explicit gpu: passes on 8xB200 but fails on 8xMI355.
  - model: RedHatAI/Meta-Llama-3.1-405B-Instruct-FP8-dynamic
    gpu: 8xMI355
    reason: "Excluded from golden gate on 8xMI355"
