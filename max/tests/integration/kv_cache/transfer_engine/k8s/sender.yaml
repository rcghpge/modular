# Service — gives the sender a stable DNS name so the receiver can resolve it
# as tcp://kv-smoke-sender:5555 within the same namespace.
apiVersion: v1
kind: Service
metadata:
  name: kv-smoke-sender
spec:
  selector:
    app: kv-smoke-sender
  ports:
    - name: zmq
      port: 5555
      targetPort: 5555
  clusterIP: None  # Headless — direct pod DNS, no load-balancing needed

---

apiVersion: batch/v1
kind: Job
metadata:
  name: kv-smoke-sender
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app: kv-smoke-sender
    spec:
      restartPolicy: Never
      runtimeClassName: "nvidia"
      imagePullSecrets:
        - name: ecr-secret
      # Force sender onto a different node than the receiver.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: kv-smoke-receiver
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-B200
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        - name: test-script
          configMap:
            name: kv-smoke-script
      containers:
        - name: sender
          image: ENGINE_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - >-
              python /smoke/test_transfer_engine_cross_node.py
              --role sender
              --sender-addr tcp://kv-smoke-sender:5555
              ${SMOKE_EXTRA_ARGS}
          env:
            - name: SMOKE_EXTRA_ARGS
              value: EXTRA_ARGS_PLACEHOLDER
            - name: MODULAR_NIXL_TRANSFER_BACKEND
              value: libfabric
            - name: FI_EFA_USE_DEVICE_RDMA
              value: "1"
            - name: MODULAR_NIXL_PLUGIN_DIR
              value: /opt/venv/lib/nixl
            - name: MODULAR_DEVICE_CONTEXT_MEMORY_MANAGER_SIZE_PERCENT
              value: "90"
          resources:
            limits:
              nvidia.com/gpu: "1"
              vpc.amazonaws.com/efa: "1"
              memory: 243200Mi
            requests:
              nvidia.com/gpu: "1"
              vpc.amazonaws.com/efa: "1"
              cpu: 22250m   # guarantee scheduling; no CPU limit so transfers can burst
              memory: 243200Mi
          securityContext:
            # IPC_LOCK: RDMA memory pinning. NET_ADMIN: EFA device access.
            # EFA device plugin injects devices with correct cgroup permissions
            # so full privileged is unnecessary. Matches dkv production config.
            capabilities:
              add:
                - IPC_LOCK
                - NET_ADMIN
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: test-script
              mountPath: /smoke
