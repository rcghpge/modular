# Each needs a unique param combo to avoid dedup.

name: failure_test
file: $KERNEL_BENCHMARKS_ROOT/autotune/tests/sample_failure.mojo
params:
- $should_crash: [False, True]
  $sleep_secs: [0.01, 0.02, 0.03]
