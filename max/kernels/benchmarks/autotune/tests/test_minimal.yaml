# Minimal kbench config used by the ubsan-only e2e tests.
#
# Points at tests/minimal_fixture.mojo (no kernel imports) so the under-ubsan
# compile fits well under the test shard timeout. Three runtime $x variants
# share one compiled .so so the test still exercises the kbench multi-instance
# scheduling path.

name: minimal
file: $KERNEL_BENCHMARKS_ROOT/autotune/tests/minimal_fixture.mojo

params:
  - $x: "[i for i in range(3)]"
