name: bench_argsort
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/bench_argsort.mojo

params:
# Small (fits in one block)
- dtype: float32
  N: [1024, 4096]

# Medium
- dtype: float32
  N: [16384, 65536]

# Large
- dtype: float32
  N: [131072, 1048576]
