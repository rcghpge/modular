name: bench_pad
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/bench_pad.mojo

params:
# 2D small with varying pad sizes
- dtype: [float32, bfloat16]
  shape: 256x256
  pad_size: [1, 3, 7]

# 2D medium
- dtype: [float32, bfloat16]
  shape: 1024x1024
  pad_size: [1, 3]

# 2D large
- dtype: [float32, bfloat16]
  shape: 4096x4096
  pad_size: [1, 3]

# 3D batch of feature maps
- dtype: [float32, bfloat16]
  shape: 32x256x256
  pad_size: [1, 3]

# 3D sequence processing
- dtype: [float32, bfloat16]
  shape: 32x512x768
  pad_size: [1, 3]
