"""Dump the MAX graph IR for the jsc_rms_test model so it can be inspected
offline (and fed to `mo-opt --gc-pipeline` to see post-fusion kernels).

Usage:
    dump_jsc_rms_ir.py [num_layers] [out.mlir]

Writes the high-level MO IR (mo.reduce.rms_norm / rmo.matmul / rmo.add) for an
`num_layers`-deep stack of `x + proj(rms_norm(x))` blocks, matching jsc_rms_test.
"""

import sys

import max.experimental.functional as F
import max.experimental.nn as max_nn
from max.dtype import DType
from max.experimental.tensor import Tensor
from max.graph import DeviceRef, TensorType

HIDDEN = 1536
BATCH = 32768


class RMSNorm(max_nn.Module[[Tensor], Tensor]):
    def __init__(self, hidden_size: int, eps: float = 1e-6):
        super().__init__()
        self.eps = eps
        self.scale = Tensor.ones((hidden_size,))

    def forward(self, x: Tensor) -> Tensor:
        x_fp32 = x.cast(DType.float32)
        weight = self.scale.cast(DType.float32)
        return F.rms_norm(x_fp32, weight, self.eps).cast(x.dtype)


class Layer(max_nn.Module[[Tensor], Tensor]):
    def __init__(self):
        super().__init__()
        self.norm = RMSNorm(HIDDEN)
        self.proj = max_nn.Linear(HIDDEN, HIDDEN, bias=False)

    def forward(self, x: Tensor) -> Tensor:
        return x + self.proj(self.norm(x))


class Model(max_nn.Module[[Tensor], Tensor]):
    def __init__(self, num_layers: int):
        super().__init__()
        self.layers = max_nn.ModuleList([Layer() for _ in range(num_layers)])

    def forward(self, x: Tensor) -> Tensor:
        for layer in self.layers:
            x = layer(x)
        return x


def main() -> None:
    num_layers = int(sys.argv[1]) if len(sys.argv) > 1 else 72
    out_path = sys.argv[2] if len(sys.argv) > 2 else "jsc_rms_max_highlevel.mlir"

    gpu = DeviceRef.GPU()
    model = Model(num_layers)
    graph = model.trace(
        TensorType(DType.bfloat16, [BATCH, HIDDEN], device=gpu)
    )
    # ModuleOp.__str__ wraps the MLIR as ``ModuleOp(<mlir>)``; strip the
    # repr wrapper so the output is parseable by ``mo-opt``.
    text = str(graph.module.mlir_module)
    if text.startswith("ModuleOp(") and text.rstrip().endswith(")"):
        text = text[len("ModuleOp(") : text.rstrip().rfind(")")]
    with open(out_path, "w") as f:
        f.write(text)
    print(f"wrote {num_layers}-layer high-level IR to {out_path} ({len(text)} bytes)")


if __name__ == "__main__":
    main()


