name: bench_moe_routing
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/bench_moe_routing.mojo

params:
# DeepSeek-V3 style: 256 experts, 8 per token, 8 groups, top-4 groups
- num_tokens: 1024
  num_experts: 256
  n_experts_per_tok: 8
  n_groups: 8
  topk_group: 4
- num_tokens: 4096
  num_experts: 256
  n_experts_per_tok: 8
  n_groups: 8
  topk_group: 4
- num_tokens: 8192
  num_experts: 256
  n_experts_per_tok: 8
  n_groups: 8
  topk_group: 4
- num_tokens: 16384
  num_experts: 256
  n_experts_per_tok: 8
  n_groups: 8
  topk_group: 4

# Mixtral style: 8 experts, 2 per token
- num_tokens: 1024
  num_experts: 8
  n_experts_per_tok: 2
  n_groups: 1
  topk_group: 1
- num_tokens: 4096
  num_experts: 8
  n_experts_per_tok: 2
  n_groups: 1
  topk_group: 1
