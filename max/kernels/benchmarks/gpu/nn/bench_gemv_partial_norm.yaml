##===----------------------------------------------------------------------===##
#
# Two-row bench sweep for the fused GEMV + partial RMS norm kernel on
# the Kimi M=1 shape (N=2112, K=7168, N_normed=1536): the unfused
# matmul + rms_norm_gpu baseline and the fused single-kernel path.
##===----------------------------------------------------------------------===##

name: bench_gemv_partial_norm
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/profile_gemv_partial_norm.mojo

common: &common
  ASSERT: none

params:

# Unfused 2-launch baseline: vendor-BLAS matmul + rms_norm_gpu on a view
# of the matmul output (no slice copy).
- <<: *common

# Fused single-kernel path: flat per-block fetch_add on finish_counter +
# intra-block single-pass RMS reduce on normed_output in the global-last
# arriver. Fastest on B200 at M=1.
- <<: *common
  fused: True
