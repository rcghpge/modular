name: bench_kv_cache_ragged_flash_attention_paged
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/bench_kv_cache_ragged_flash_attention_paged.mojo

params:

# llama3.3.70b shapes (TP=4, production serving)
# Minimal fixed-param block so the dashboard can match BQ specs for this model.
# BQ specs include: num_q_heads=16/num_kv_heads=2/head_dim=128/model=llama3.3.70b/tp=4
- num_q_heads: 16
  num_kv_heads: 2
  head_dim: 128
  metadata:
    MODEL: llama3.3.70b

# llama3.1 shapes
# token gen
- $seq_len: 1
  $cache_len: [215, 1024]
  $batch_size: [20, 250, 500]
  num_q_heads: 32
  num_kv_heads: 8
  head_dim: 128
  page_size: [16, 64, 256]
  $use_random_seq_lengths: False
  $use_random_cache_lengths: False
  metadata:
    MODEL: llama3.1

- $seq_len: [256, 512]
  $cache_len: 0
  $batch_size: [20, 80]
  num_q_heads: 32
  num_kv_heads: 8
  head_dim: 128
  page_size: [16, 16, 64, 256]
  $use_random_seq_lengths: False
  $use_random_cache_lengths: False
  metadata:
    MODEL: llama3.1

# # llama 3.2 shape
- $seq_len: 1
  $cache_len: [215, 1024]
  $batch_size: [20, 250, 500]
  num_q_heads: 24
  num_kv_heads: 8
  head_dim: 128
  page_size: [16, 64, 256]
  $use_random_seq_lengths: False
  $use_random_cache_lengths: False
  metadata:
    MODEL: llama3.2

- $seq_len: [215, 1024]
  $cache_len: 0
  $batch_size: [20, 80]
  num_q_heads: 24
  num_kv_heads: 8
  head_dim: 128
  page_size: [16, 64, 256]
  $use_random_seq_lengths: False
  $use_random_cache_lengths: False
  metadata:
    MODEL: llama3.2

# llama3.3.70b shapes (TP=4, production serving)
# Minimal fixed-param block so the dashboard can match BQ specs for this model.
# BQ specs include: num_q_heads=16/num_kv_heads=2/head_dim=128/model=llama3.3.70b/tp=4
- num_q_heads: 16
  num_kv_heads: 2
  head_dim: 128
  metadata:
    MODEL: llama3.3.70b
