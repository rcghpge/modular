name: bench_fp8_index
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/bench_fp8_index.mojo

params:

# DeepSeek V3.2 Indexer shapes (num_heads=128, depth=128).
- num_heads: 128
  depth: 128
  $batch_size: [1, 2, 4]
  $seq_len: [128, 512]
  $num_keys: [128, 512, 1024]

# num_heads=64 variant.
- num_heads: 64
  depth: 128
  $batch_size: [1, 2, 4]
  $seq_len: [128, 512]
  $num_keys: [128, 512, 1024]
