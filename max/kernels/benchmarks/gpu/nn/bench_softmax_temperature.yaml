name: bench_softmax
file: $KERNEL_BENCHMARKS_ROOT/gpu/nn/bench_softmax.mojo


params:
# softmax_with_temperature — LLM logits with typical temperatures
- dtype: bfloat16
  shape: 1x128256
  temperature: 0.6
- dtype: bfloat16
  shape: 32x128256
  temperature: 0.6
- dtype: bfloat16
  shape: 128x128256
  temperature: 0.6

# softmax_with_temperature — varying temperatures
- dtype: bfloat16
  shape: 32x128256
  temperature: 0.1
- dtype: bfloat16
  shape: 32x128256
  temperature: 1.0
- dtype: bfloat16
  shape: 32x128256
  temperature: 2.0

# softmax_with_temperature — Llama-style shapes
- dtype: bfloat16
  shape: 256x4096
  temperature: 0.6
- dtype: bfloat16
  shape: 1024x4096
  temperature: 0.6

# softmax_with_temperature — float32
- dtype: float32
  shape: 256x4096
  temperature: 0.6
- dtype: float32
  shape: 32x128256
  temperature: 0.6
