name: bench_dual_gemm
file: $KERNEL_BENCHMARKS_ROOT/gpu/bench_dual_gemm.mojo

params:
# Llama-3.1-8B gate/up projection (SwiGLU): M varies, N=14336, K=4096
- dtype: bfloat16
  M: 32
  N: 14336
  K: 4096
- dtype: bfloat16
  M: 128
  N: 14336
  K: 4096
- dtype: bfloat16
  M: 512
  N: 14336
  K: 4096
- dtype: bfloat16
  M: 1024
  N: 14336
  K: 4096

# Llama-3.1-70B gate/up: N=28672, K=8192
- dtype: bfloat16
  M: 128
  N: 28672
  K: 8192
- dtype: bfloat16
  M: 512
  N: 28672
  K: 8192

# float16 variants
- dtype: float16
  M: 128
  N: 14336
  K: 4096
- dtype: float16
  M: 128
  N: 28672
  K: 8192
