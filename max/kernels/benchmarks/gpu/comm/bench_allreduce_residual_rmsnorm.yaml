name: bench_allreduce_residual_rmsnorm
file: $KERNEL_BENCHMARKS_ROOT/gpu/comm/bench_allreduce_residual_rmsnorm.mojo

# Sweeps both kernel modes via the `quantize` flag (the FP8 type is
# platform-dependent, so it can't be named portably in this YAML):
#   quantize=True  -> FP8 output, auto-detected platform FP8 type
#                     (AMD float8_e4m3fnuz, NVIDIA float8_e4m3fn); fuses
#                     dynamic quantization and runs all five variants.
#   quantize=False -> output dtype == in_dtype (no quantization, no scales);
#                     runs the allreduce-only baseline and the fully-fused
#                     kernels (the FP8-only 2-launch references + FP8
#                     verification are skipped).

params:
  - in_dtype: [DType.bfloat16]
    num_gpus: [4]
    quantize: [True, False]
    $num_rows: [1, 8, 32, 128, 512, 1024, 4096, 8192]
    num_cols: [4096, 8192, 16384]
