name: bench_scatter
file: $KERNEL_BENCHMARKS_ROOT/gpu/comm/bench_scatter.mojo

# Focus on small sizes typical of row_offsets distribution.
params:
- dtype: [DType.uint32]
  num_gpus: [2]
  dp_size: [2]
  $num_elems: "[1, 3, 8, 16, 64, 256, 1024, 4096, 16384]"

- dtype: [DType.uint32]
  num_gpus: [4]
  dp_size: [2, 4]
  $num_elems: "[1, 3, 8, 16, 64, 256, 1024, 4096, 16384]"

- dtype: [DType.uint32]
  num_gpus: [8]
  dp_size: [2, 4, 8]
  $num_elems: "[1, 3, 8, 16, 64, 256, 1024, 4096, 16384]"
