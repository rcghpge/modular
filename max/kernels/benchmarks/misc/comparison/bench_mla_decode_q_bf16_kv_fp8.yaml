# MLA decode Q=BF16 KV=FP8 benchmark.
#
# Compares MAX Q=BF16/KV=FP8 against FlashInfer BF16 baseline.
# FlashInfer does not support mixed Q=BF16/KV=FP8, so the fair comparison
# is against FlashInfer BF16. This shows the speedup from FP8 KV cache
# (halved memory bandwidth) while keeping query precision in BF16.
#
# Usage:
#   kbench bench_mla_decode_q_bf16_kv_fp8.yaml
#   kbench bench_mla_decode_q_bf16_kv_fp8.yaml --param engine:"[modular_max]"
#   kbench bench_mla_decode_q_bf16_kv_fp8.yaml --param engine:"[flashinfer]"

name: bench_mla_decode_q_bf16_kv_fp8
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_blackwell_mla_decode.py

# Shared model dimensions for DeepSeek V3/R1.
deepseek-v2-dims: &deepseek-v2-dims
  $num_q_heads: 128
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $q_len_per_request: 1
  $num_iters: 100
  model: "deepseek-v2"

# MAX: Q=BF16, KV=FP8 (dtype controls KV cache, q_dtype keeps Q in BF16).
deepseek-v2-max: &deepseek-v2-max
  <<: *deepseek-v2-dims
  $engine: "modular_max"
  $dtype: "float8_e4m3fn"
  $q_dtype: "bf16"

# FlashInfer BF16 baseline (FlashInfer cannot do split Q=BF16/KV=FP8,
# so we compare against its BF16 path to show the FP8 KV cache advantage).
deepseek-v2-flashinfer: &deepseek-v2-flashinfer
  <<: *deepseek-v2-dims
  $engine: "flashinfer"
  $dtype: "bfloat16"
  $q_dtype: "bf16"

# latency sensitive configuration
params:
- <<: *deepseek-v2-max
  $batch_size: 1
  $cache_len: 32768

- <<: *deepseek-v2-flashinfer
  $batch_size: 1
  $cache_len: 32768

- <<: *deepseek-v2-max
  $batch_size: 1
  $cache_len: 65536

- <<: *deepseek-v2-flashinfer
  $batch_size: 1
  $cache_len: 65536

- <<: *deepseek-v2-max
  $batch_size: 2
  $cache_len: 32768

- <<: *deepseek-v2-flashinfer
  $batch_size: 2
  $cache_len: 32768

- <<: *deepseek-v2-max
  $batch_size: 2
  $cache_len: 65536

- <<: *deepseek-v2-flashinfer
  $batch_size: 2
  $cache_len: 65536

- <<: *deepseek-v2-max
  $batch_size: 4
  $cache_len: 32768

- <<: *deepseek-v2-flashinfer
  $batch_size: 4
  $cache_len: 32768

- <<: *deepseek-v2-max
  $batch_size: 4
  $cache_len: 65536

- <<: *deepseek-v2-flashinfer
  $batch_size: 4
  $cache_len: 65536

- <<: *deepseek-v2-max
  $batch_size: 8
  $cache_len: 32768

- <<: *deepseek-v2-flashinfer
  $batch_size: 8
  $cache_len: 32768

- <<: *deepseek-v2-max
  $batch_size: 8
  $cache_len: 65536

- <<: *deepseek-v2-flashinfer
  $batch_size: 8
  $cache_len: 65536

# Production-representative configs (per-GPU with 8-GPU EP/TP deployment)
# SGLang/Ant Group: 12-48 per GPU, vLLM TP8: up to 128 per GPU
# KV cache 4K-8K is the common production range for DeepSeek R1 decode
- <<: *deepseek-v2-max
  $batch_size: 16
  $cache_len: 4096

- <<: *deepseek-v2-flashinfer
  $batch_size: 16
  $cache_len: 4096

- <<: *deepseek-v2-max
  $batch_size: 16
  $cache_len: 8192

- <<: *deepseek-v2-flashinfer
  $batch_size: 16
  $cache_len: 8192

- <<: *deepseek-v2-max
  $batch_size: 32
  $cache_len: 4096

- <<: *deepseek-v2-flashinfer
  $batch_size: 32
  $cache_len: 4096

- <<: *deepseek-v2-max
  $batch_size: 32
  $cache_len: 8192

- <<: *deepseek-v2-flashinfer
  $batch_size: 32
  $cache_len: 8192

- <<: *deepseek-v2-max
  $batch_size: 64
  $cache_len: 2048

- <<: *deepseek-v2-flashinfer
  $batch_size: 64
  $cache_len: 2048

- <<: *deepseek-v2-max
  $batch_size: 128
  $cache_len: 1024

- <<: *deepseek-v2-flashinfer
  $batch_size: 128
  $cache_len: 1024

# Extra-large batch stress test configs
- <<: *deepseek-v2-max
  $batch_size: 256
  $cache_len: 2048

- <<: *deepseek-v2-flashinfer
  $batch_size: 256
  $cache_len: 2048

- <<: *deepseek-v2-max
  $batch_size: 256
  $cache_len: 4096

- <<: *deepseek-v2-flashinfer
  $batch_size: 256
  $cache_len: 4096

- <<: *deepseek-v2-max
  $batch_size: 512
  $cache_len: 2048

- <<: *deepseek-v2-flashinfer
  $batch_size: 512
  $cache_len: 2048

- <<: *deepseek-v2-max
  $batch_size: 512
  $cache_len: 4096

- <<: *deepseek-v2-flashinfer
  $batch_size: 512
  $cache_len: 4096

# Gap 1: Very small cache_len (<1K)
# Tests the kernel with very few KV pages -- potential underutilization.
# Covers prefill-like decode scenarios with tiny cache and high batch.
- <<: *deepseek-v2-max
  $batch_size: 128
  $cache_len: 64

- <<: *deepseek-v2-flashinfer
  $batch_size: 128
  $cache_len: 64

- <<: *deepseek-v2-max
  $batch_size: 128
  $cache_len: 128

- <<: *deepseek-v2-flashinfer
  $batch_size: 128
  $cache_len: 128

- <<: *deepseek-v2-max
  $batch_size: 64
  $cache_len: 256

- <<: *deepseek-v2-flashinfer
  $batch_size: 64
  $cache_len: 256

- <<: *deepseek-v2-max
  $batch_size: 64
  $cache_len: 512

- <<: *deepseek-v2-flashinfer
  $batch_size: 64
  $cache_len: 512

# Gap 2: Mid-range (fills the 8K->32K jump with 16K)
- <<: *deepseek-v2-max
  $batch_size: 8
  $cache_len: 16384

- <<: *deepseek-v2-flashinfer
  $batch_size: 8
  $cache_len: 16384

- <<: *deepseek-v2-max
  $batch_size: 4
  $cache_len: 16384

- <<: *deepseek-v2-flashinfer
  $batch_size: 4
  $cache_len: 16384

# Gap 3: Large cache_len (>64K up to 163K max context)
# Tests deep into long-context territory for DeepSeek models.
- <<: *deepseek-v2-max
  $batch_size: 1
  $cache_len: 98304

- <<: *deepseek-v2-flashinfer
  $batch_size: 1
  $cache_len: 98304

- <<: *deepseek-v2-max
  $batch_size: 1
  $cache_len: 131072

- <<: *deepseek-v2-flashinfer
  $batch_size: 1
  $cache_len: 131072

- <<: *deepseek-v2-max
  $batch_size: 1
  $cache_len: 163840

- <<: *deepseek-v2-flashinfer
  $batch_size: 1
  $cache_len: 163840

# Non-power-of-2 cache_len configs for dispatch robustness testing
# Validates that kernel dispatch, page-level partitioning, and split-k
# reduction handle arbitrary cache lengths correctly.
- <<: *deepseek-v2-max
  $batch_size: 32
  $cache_len: 3000

- <<: *deepseek-v2-flashinfer
  $batch_size: 32
  $cache_len: 3000

- <<: *deepseek-v2-max
  $batch_size: 16
  $cache_len: 5000

- <<: *deepseek-v2-flashinfer
  $batch_size: 16
  $cache_len: 5000

- <<: *deepseek-v2-max
  $batch_size: 16
  $cache_len: 7777

- <<: *deepseek-v2-flashinfer
  $batch_size: 16
  $cache_len: 7777

- <<: *deepseek-v2-max
  $batch_size: 8
  $cache_len: 10000

- <<: *deepseek-v2-flashinfer
  $batch_size: 8
  $cache_len: 10000

- <<: *deepseek-v2-max
  $batch_size: 2
  $cache_len: 50000

- <<: *deepseek-v2-flashinfer
  $batch_size: 2
  $cache_len: 50000
