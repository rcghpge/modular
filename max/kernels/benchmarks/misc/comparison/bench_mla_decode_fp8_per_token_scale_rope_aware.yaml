# MLA decode FP8 per-token-scale rope-aware benchmark.
#
# Compares three kernel variants at DeepSeek V3/R1 dimensions:
#   1. MAX per-token-scale rope-aware (q_dtype=fp8_rope_aware):
#      - Content (kv_lora_rank=512) is FP8, rope (64 dims) stays BF16
#      - KV row = 640 bytes (512 FP8 + 128 BF16), Q row = 640 bytes
#      - Per-token FP8 scaling (SnapMLA): sigma_KV per KV token, sigma_Q per Q token
#        with real random scales in [0.8, 1.2] passed through explicit scale tensors
#   2. MAX uniform FP8 (q_dtype=fp8):
#      - All 576 dims quantized to FP8 (including rope)
#      - KV row = 576 bytes, Q row = 576 bytes
#   3. FlashInfer TRT-LLM (engine=flashinfer):
#      - Uniform FP8 (576 bytes/row), reference implementation
#
# Usage:
#   kbench bench_mla_decode_fp8_per_token_scale_rope_aware.yaml
#   kbench bench_mla_decode_fp8_per_token_scale_rope_aware.yaml --param batch_size:"[1, 8, 64]"

name: bench_mla_decode_fp8_per_token_scale_rope_aware
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_blackwell_mla_decode.py

# Common DeepSeek V3/R1 dimensions shared by all configs.
deepseek-v2-commons: &deepseek-v2-commons
  $num_q_heads: 128
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $q_len_per_request: 1
  $num_iters: 100
  $dtype: "float8_e4m3fn"
  model: "deepseek-v2"

# MAX rope-aware vs MAX uniform FP8 vs FlashInfer.
# q_dtype selects the MAX kernel variant; FlashInfer always runs uniform QKV FP8
# (q_dtype is ignored for FlashInfer — it uses $dtype for both Q and KV).
deepseek-v2-compare: &deepseek-v2-compare
  <<: *deepseek-v2-commons
  $engine: ["modular_max", "modular_max", "flashinfer"]
  $q_dtype: ["fp8_rope_aware", "fp8", "fp8"]

params:
# ---- Latency-sensitive: batch_size=1, long context ----
- <<: *deepseek-v2-compare
  $batch_size: 1
  $cache_len: 1024

- <<: *deepseek-v2-compare
  $batch_size: 1
  $cache_len: 4096

- <<: *deepseek-v2-compare
  $batch_size: 1
  $cache_len: 16384

- <<: *deepseek-v2-compare
  $batch_size: 1
  $cache_len: 32768

- <<: *deepseek-v2-compare
  $batch_size: 1
  $cache_len: 65536

- <<: *deepseek-v2-compare
  $batch_size: 1
  $cache_len: 163840

# ---- Production configs (per-GPU with 8-GPU EP/TP) ----
- <<: *deepseek-v2-compare
  $batch_size: 16
  $cache_len: 4096

- <<: *deepseek-v2-compare
  $batch_size: 16
  $cache_len: 8192

- <<: *deepseek-v2-compare
  $batch_size: 32
  $cache_len: 4096

- <<: *deepseek-v2-compare
  $batch_size: 32
  $cache_len: 8192

- <<: *deepseek-v2-compare
  $batch_size: 64
  $cache_len: 2048

- <<: *deepseek-v2-compare
  $batch_size: 128
  $cache_len: 1024

# ---- Medium batch, medium context ----
- <<: *deepseek-v2-compare
  $batch_size: 4
  $cache_len: 16384

- <<: *deepseek-v2-compare
  $batch_size: 8
  $cache_len: 16384

- <<: *deepseek-v2-compare
  $batch_size: 4
  $cache_len: 32768

- <<: *deepseek-v2-compare
  $batch_size: 8
  $cache_len: 32768

# ---- Large batch stress tests ----
- <<: *deepseek-v2-compare
  $batch_size: 256
  $cache_len: 2048

- <<: *deepseek-v2-compare
  $batch_size: 512
  $cache_len: 2048
