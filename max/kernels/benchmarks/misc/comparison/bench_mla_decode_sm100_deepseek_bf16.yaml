# MLA decode SM100 benchmark: DeepSeek V3 BF16 family (num_q_heads=128).
#
# 3-way comparison via $config preset (single pivot column for kbench):
#   1. fi_bf16         — FlashInfer BF16  (baseline — iloc[0])
#   2. max_bf16        — MAX BF16
#   3. max_qbf16_kvfp8 — MAX Q=BF16 / KV=FP8
#
# Usage:
#   kbench bench_mla_decode_sm100_deepseek_bf16.yaml
#   kbench bench_mla_decode_sm100_deepseek_bf16.yaml --param config:"[max_bf16]"
#   kbench bench_mla_decode_sm100_deepseek_bf16.yaml --param config:"[max_bf16]" --param batch_size:"[1]" --param cache_len:"[32768]"

name: bench_mla_decode_sm100_deepseek_bf16
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_blackwell_mla_decode.py

# Shared dimensions anchor
deepseek-dims: &deepseek-dims
  $num_q_heads: 128
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $q_len_per_request: 1
  $num_iters: 100

# 3-way BF16 family comparison — $config encodes engine+dtype+q_dtype
deepseek-bf16-family: &deepseek-bf16-family
  <<: *deepseek-dims
  $config: ["fi_bf16", "max_bf16", "max_qbf16_kvfp8"]
  model: "deepseek-v3"

params:

# Latency-sensitive
- <<: *deepseek-bf16-family
  $batch_size: 1
  $cache_len: 32768

- <<: *deepseek-bf16-family
  $batch_size: 1
  $cache_len: 65536

- <<: *deepseek-bf16-family
  $batch_size: 2
  $cache_len: 32768

- <<: *deepseek-bf16-family
  $batch_size: 2
  $cache_len: 65536

- <<: *deepseek-bf16-family
  $batch_size: 4
  $cache_len: 32768

- <<: *deepseek-bf16-family
  $batch_size: 4
  $cache_len: 65536

- <<: *deepseek-bf16-family
  $batch_size: 8
  $cache_len: 32768

- <<: *deepseek-bf16-family
  $batch_size: 8
  $cache_len: 65536

# Production-representative
- <<: *deepseek-bf16-family
  $batch_size: 16
  $cache_len: 4096

- <<: *deepseek-bf16-family
  $batch_size: 16
  $cache_len: 8192

- <<: *deepseek-bf16-family
  $batch_size: 32
  $cache_len: 4096

- <<: *deepseek-bf16-family
  $batch_size: 32
  $cache_len: 8192

- <<: *deepseek-bf16-family
  $batch_size: 64
  $cache_len: 2048

- <<: *deepseek-bf16-family
  $batch_size: 128
  $cache_len: 1024

# Extra-large batch
- <<: *deepseek-bf16-family
  $batch_size: 256
  $cache_len: 2048

- <<: *deepseek-bf16-family
  $batch_size: 256
  $cache_len: 4096

- <<: *deepseek-bf16-family
  $batch_size: 512
  $cache_len: 2048

- <<: *deepseek-bf16-family
  $batch_size: 512
  $cache_len: 4096

# Very small cache_len (<1K)
- <<: *deepseek-bf16-family
  $batch_size: 128
  $cache_len: 64

- <<: *deepseek-bf16-family
  $batch_size: 128
  $cache_len: 128

- <<: *deepseek-bf16-family
  $batch_size: 64
  $cache_len: 256

- <<: *deepseek-bf16-family
  $batch_size: 64
  $cache_len: 512

# Mid-range (16K)
- <<: *deepseek-bf16-family
  $batch_size: 8
  $cache_len: 16384

- <<: *deepseek-bf16-family
  $batch_size: 4
  $cache_len: 16384

# Large cache_len (>64K)
- <<: *deepseek-bf16-family
  $batch_size: 1
  $cache_len: 98304

- <<: *deepseek-bf16-family
  $batch_size: 1
  $cache_len: 131072

- <<: *deepseek-bf16-family
  $batch_size: 1
  $cache_len: 163840

# Non-power-of-2
- <<: *deepseek-bf16-family
  $batch_size: 32
  $cache_len: 3000

- <<: *deepseek-bf16-family
  $batch_size: 16
  $cache_len: 5000

- <<: *deepseek-bf16-family
  $batch_size: 16
  $cache_len: 7777

- <<: *deepseek-bf16-family
  $batch_size: 8
  $cache_len: 10000

- <<: *deepseek-bf16-family
  $batch_size: 2
  $cache_len: 50000
