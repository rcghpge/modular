# MLA decode benchmark for Kimi K2.5 (moonshotai/Kimi-K2.5-VL-A3B-Thinking).
#
# Kimi K2.5 uses the same MLA architecture as DeepSeek V3/R1 but with
# 64 attention heads instead of 128. Key MLA parameters from Kimi K2's
# HuggingFace config (moonshotai/Kimi-K2-Instruct):
#   - num_attention_heads = 64
#   - kv_lora_rank = 512
#   - qk_nope_head_dim = 128
#   - qk_rope_head_dim = 64
#   - max_position_embeddings = 131072
#
# Compares three kernel variants:
#   1. MAX per-token-scale rope-aware (q_dtype=fp8_rope_aware):
#      - Content (kv_lora_rank=512) is FP8, rope (64 dims) stays BF16
#      - KV row = 640 bytes (512 FP8 + 128 BF16), Q row = 640 bytes
#      - Per-token FP8 scaling (SnapMLA)
#   2. MAX uniform FP8 (q_dtype=fp8):
#      - All 576 dims quantized to FP8
#   3. FlashInfer TRT-LLM (engine=flashinfer):
#      - Uniform FP8 (576 bytes/row), reference implementation
#
# Usage:
#   kbench bench_kimi_k25_mla_decode.yaml
#   kbench bench_kimi_k25_mla_decode.yaml --param batch_size:"[1, 8, 64]"

name: bench_kimi_k25_mla_decode
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_blackwell_mla_decode.py

# Kimi K2.5 MLA dimensions (same as Kimi K2 text config).
# Differs from DeepSeek V3 only in num_q_heads: 64 vs 128.
kimi-k25-commons: &kimi-k25-commons
  $num_q_heads: 64
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $q_len_per_request: 1
  $num_iters: 100
  $dtype: "float8_e4m3fn"
  model: "kimi-k2.5"

# MAX rope-aware vs MAX uniform FP8 vs FlashInfer.
kimi-k25-compare: &kimi-k25-compare
  <<: *kimi-k25-commons
  $engine: ["modular_max", "modular_max", "flashinfer"]
  $q_dtype: ["fp8_rope_aware", "fp8", "fp8"]

params:
# ---- Latency-sensitive: batch_size=1, long context ----
- <<: *kimi-k25-compare
  $batch_size: 1
  $cache_len: 1024

- <<: *kimi-k25-compare
  $batch_size: 1
  $cache_len: 4096

- <<: *kimi-k25-compare
  $batch_size: 1
  $cache_len: 16384

- <<: *kimi-k25-compare
  $batch_size: 1
  $cache_len: 32768

- <<: *kimi-k25-compare
  $batch_size: 1
  $cache_len: 65536

- <<: *kimi-k25-compare
  $batch_size: 1
  $cache_len: 131072

# ---- Production configs (per-GPU with 8-GPU EP/TP) ----
- <<: *kimi-k25-compare
  $batch_size: 16
  $cache_len: 4096

- <<: *kimi-k25-compare
  $batch_size: 16
  $cache_len: 8192

- <<: *kimi-k25-compare
  $batch_size: 32
  $cache_len: 4096

- <<: *kimi-k25-compare
  $batch_size: 32
  $cache_len: 8192

- <<: *kimi-k25-compare
  $batch_size: 64
  $cache_len: 2048

- <<: *kimi-k25-compare
  $batch_size: 128
  $cache_len: 1024

# ---- Medium batch, medium context ----
- <<: *kimi-k25-compare
  $batch_size: 4
  $cache_len: 16384

- <<: *kimi-k25-compare
  $batch_size: 8
  $cache_len: 16384

- <<: *kimi-k25-compare
  $batch_size: 4
  $cache_len: 32768

- <<: *kimi-k25-compare
  $batch_size: 8
  $cache_len: 32768

# ---- Large batch stress tests ----
- <<: *kimi-k25-compare
  $batch_size: 256
  $cache_len: 2048

- <<: *kimi-k25-compare
  $batch_size: 512
  $cache_len: 2048
