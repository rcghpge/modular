# AMD MLA prefill benchmark: MAX vs aiter, Kimi-K2.5 shapes.
# Sweep mirrors the canonical kimi-k2.5 MLA prefill set (qkv_len x batch_size,
# bounded to <16384 total tokens). This is pure prefill (no prior KV cache), so
# the reference's cache_len axis / `q_len < cache_len` rule do not apply.
# Differences from the reference: AMD engines (modular_max, aiter) instead of
# flashinfer, and both bf16 and fp8 dtypes.
# Run:
#   kbench bench_amd_mla_prefill.yaml
#   kbench bench_amd_mla_prefill.yaml --param dtype:[float8_e4m3fn]

name: bench_amd_mla_prefill
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_amd_mla.py

kimi-k2.5-commons: &kimi-commons
  $num_q_heads: 16
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $v_head_dim: 128
  $engine: ["modular_max", "aiter"]
  $dtype: ["float8_e4m3fn"]
  $mode: [prefill]
  metadata:
    model: "kimi-k2.5"

params:
- <<: *kimi-commons
  $qkv_len: [512, 1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072]
  $batch_size: [1]
