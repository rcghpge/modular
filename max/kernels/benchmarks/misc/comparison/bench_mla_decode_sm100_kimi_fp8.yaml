# MLA decode SM100 benchmark: Kimi K2.5 FP8 family (num_q_heads=64).
#
# 3-way comparison via $config preset (single pivot column for kbench):
#   1. fi_fp8       — FlashInfer FP8  (baseline — iloc[0])
#   2. max_fp8_snap — SnapMLA FP8 rope-aware
#   3. max_fp8      — MAX FP8 uniform
#
# Usage:
#   kbench bench_mla_decode_sm100_kimi_fp8.yaml
#   kbench bench_mla_decode_sm100_kimi_fp8.yaml --param config:"[max_fp8_snap]"
#   kbench bench_mla_decode_sm100_kimi_fp8.yaml --param config:"[max_fp8_snap]" --param batch_size:"[1]" --param cache_len:"[32768]"

name: bench_mla_decode_sm100_kimi_fp8
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_blackwell_mla_decode.py

# Shared dimensions anchor
kimi-dims: &kimi-dims
  $num_q_heads: 64
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $q_len_per_request: 1
  $num_iters: 100

# 3-way FP8 family comparison — $config encodes engine+dtype+q_dtype
kimi-fp8-family: &kimi-fp8-family
  <<: *kimi-dims
  $config: ["fi_fp8", "max_fp8_snap", "max_fp8"]
  model: "kimi-k2.5"

params:

# Latency-sensitive
- <<: *kimi-fp8-family
  $batch_size: 1
  $cache_len: 32768

- <<: *kimi-fp8-family
  $batch_size: 1
  $cache_len: 65536

- <<: *kimi-fp8-family
  $batch_size: 2
  $cache_len: 32768

- <<: *kimi-fp8-family
  $batch_size: 2
  $cache_len: 65536

- <<: *kimi-fp8-family
  $batch_size: 4
  $cache_len: 32768

- <<: *kimi-fp8-family
  $batch_size: 4
  $cache_len: 65536

- <<: *kimi-fp8-family
  $batch_size: 8
  $cache_len: 32768

- <<: *kimi-fp8-family
  $batch_size: 8
  $cache_len: 65536

# Production-representative
- <<: *kimi-fp8-family
  $batch_size: 16
  $cache_len: 4096

- <<: *kimi-fp8-family
  $batch_size: 16
  $cache_len: 8192

- <<: *kimi-fp8-family
  $batch_size: 32
  $cache_len: 4096

- <<: *kimi-fp8-family
  $batch_size: 32
  $cache_len: 8192

- <<: *kimi-fp8-family
  $batch_size: 64
  $cache_len: 2048

- <<: *kimi-fp8-family
  $batch_size: 128
  $cache_len: 1024

# Extra-large batch
- <<: *kimi-fp8-family
  $batch_size: 256
  $cache_len: 2048

- <<: *kimi-fp8-family
  $batch_size: 256
  $cache_len: 4096

- <<: *kimi-fp8-family
  $batch_size: 512
  $cache_len: 2048

- <<: *kimi-fp8-family
  $batch_size: 512
  $cache_len: 4096

# Very small cache_len (<1K)
- <<: *kimi-fp8-family
  $batch_size: 128
  $cache_len: 64

- <<: *kimi-fp8-family
  $batch_size: 128
  $cache_len: 128

- <<: *kimi-fp8-family
  $batch_size: 64
  $cache_len: 256

- <<: *kimi-fp8-family
  $batch_size: 64
  $cache_len: 512

# Mid-range (16K)
- <<: *kimi-fp8-family
  $batch_size: 8
  $cache_len: 16384

- <<: *kimi-fp8-family
  $batch_size: 4
  $cache_len: 16384

# Large cache_len (>64K)
- <<: *kimi-fp8-family
  $batch_size: 1
  $cache_len: 98304

- <<: *kimi-fp8-family
  $batch_size: 1
  $cache_len: 131072

- <<: *kimi-fp8-family
  $batch_size: 1
  $cache_len: 163840

# Non-power-of-2
- <<: *kimi-fp8-family
  $batch_size: 32
  $cache_len: 3000

- <<: *kimi-fp8-family
  $batch_size: 16
  $cache_len: 5000

- <<: *kimi-fp8-family
  $batch_size: 16
  $cache_len: 7777

- <<: *kimi-fp8-family
  $batch_size: 8
  $cache_len: 10000

- <<: *kimi-fp8-family
  $batch_size: 2
  $cache_len: 50000
