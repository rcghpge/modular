# AMD MLA decode benchmark: MAX vs aiter, Kimi-K2.5 shapes.
# Sweep mirrors the canonical kimi-k2.5 MLA decode set (batch_size x cache_len,
# q_len_per_request=1). Differences from the reference: AMD engines
# (modular_max, aiter) instead of flashinfer, and both bf16 and fp8 dtypes.
# Run:
#   kbench bench_amd_mla_decode.yaml
#   kbench bench_amd_mla_decode.yaml --param dtype:[float8_e4m3fn]

name: bench_amd_mla_decode
file: $BUILD_WORKSPACE_DIRECTORY/max/kernels/benchmarks/misc/comparison/bench_amd_mla.py

kimi-k2.5-commons: &kimi-commons
  $num_q_heads: 16
  $qk_nope_head_dim: 128
  $qk_rope_head_dim: 64
  $kv_lora_rank: 512
  $v_head_dim: 128
  $engine: ["modular_max", "aiter"]
  $dtype: ["float8_e4m3fn"]
  $mode: [decode]
  metadata:
    model: "kimi-k2.5"

params:
- <<: *kimi-commons
  $batch_size: [1, 4, 8, 16]
  $cache_len: [4096, 8192, 16384, 32768, 65536, 131072]
