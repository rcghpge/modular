name: attention_fp8
file: $BUILD_WORKSPACE_DIRECTORY/max/python/benchmarks/testbed/kbench_entrypoint.py
single_invoke: true

params:
# Llama3.1-405B FP8 dynamic, TP=8 per-shard config (multi-turn workload)
- $harness: attention_with_rope
  $dtype: fp8
  $model_name: llama3-405b-tp8-fp8
  $hidden_size: 16384
  $n_heads: 16
  $n_kv_heads: 1
  $head_dim: 128
  $max_seq_len: 131072
  $rope_theta: 500000.0
  $batch_size: [1, 8, 16, 32]
  $seq_len: [1, 125, 10000]
  $ctx_len: [8192, 16384, 32768]
