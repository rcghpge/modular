name: gemma4_attention
file: $BUILD_WORKSPACE_DIRECTORY/max/python/layer_benchmarks/testbed/kbench_entrypoint.py
single_invoke: true

params:
# gemma4-12b sliding window (local) attention config
- $harness: gemma4_attention
  $model_name: gemma4-12b-local
  $hidden_size: 3840
  $n_heads: 16
  $n_kv_heads: 8
  $n_global_kv_heads: 4
  $head_dim: 256
  $global_head_dim: 512
  $max_seq_len: 131072
  $rope_theta: 1000000.0
  $is_sliding: true
  $attention_k_eq_v: true
  $local_window_size: 1024
  $batch_size: [1, 8]
  $seq_len: [1, 8192]
  $ctx_len: [8192, 16384, 32768, 49152]
