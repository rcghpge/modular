name: qwen3_attention
file: $BUILD_WORKSPACE_DIRECTORY/max/python/benchmarks/testbed/kbench_entrypoint.py
single_invoke: true

params:
# Qwen/Qwen3-8B attention config
- $harness: qwen3_attention
  $model_name: qwen3-8b
  $hidden_size: 4096
  $n_heads: 32
  $n_kv_heads: 8
  $head_dim: 128
  $max_seq_len: 131072
  $rope_theta: 1000000.0
  $qk_norm_eps: 1e-6
  $batch_size: [1, 8]
  $seq_len: [1, 8192]
  $ctx_len: [8192, 16384, 32768, 49152]
