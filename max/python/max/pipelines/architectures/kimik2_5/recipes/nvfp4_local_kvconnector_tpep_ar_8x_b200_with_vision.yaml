# Kimi K2.5 NVFP4 (TP attention + EP MoE, allreduce, local KV-connector).
# ``data_parallel_degree: 1`` selects TP attention on 8 GPUs;
# ``ep_use_allreduce: true`` uses allreduce for MoE expert dispatch;
# ``kv_connector: local`` enables local KV cache offload.
model:
  model_path: nvidia/Kimi-K2.5-NVFP4
  trust_remote_code: true
  device_specs: [0, 1, 2, 3, 4, 5, 6, 7]
  data_parallel_degree: 1
  kv_cache:
    kv_cache_format: float8_e4m3fn
    device_memory_utilization: 0.75
    kv_connector: local

runtime:
  ep_size: 8
  ep_use_allreduce: true
  max_batch_input_tokens: 4096
