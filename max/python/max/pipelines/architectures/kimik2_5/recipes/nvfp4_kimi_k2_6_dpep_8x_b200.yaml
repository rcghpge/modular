# Kimi K2.6 NVFP4: routed experts NVFP4; layer 0 + shared experts BF16.
# Requires ``quantization_encoding: float4_e2m1fnx2`` (or pipeline default for NVFP4).
# DP attention + EP MoE (data_parallel_degree=8, dpep). For TP attention, use
# ``nvfp4_kimi_k2_6_tpep_8x_b200.yaml``.
model:
  model_path: nvidia/Kimi-K2.6-NVFP4
  device_specs: [0, 1, 2, 3, 4, 5, 6, 7]
  data_parallel_degree: 8
  max_length: 262144
  trust_remote_code: true
  kv_cache:
    device_memory_utilization: 0.8

sampling:
  enable_structured_output: true

runtime:
  ep_size: 8
  max_batch_input_tokens: 4096
