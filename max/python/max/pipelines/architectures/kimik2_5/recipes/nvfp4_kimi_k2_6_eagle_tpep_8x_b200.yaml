# Kimi K2.6 NVFP4 + Eagle3 speculative decoding (TP attention + EP MoE).
# Draft: nvidia/Kimi-K2.6-Eagle3 (MLA, 1-layer, BF16).
# Speculative: eagle, 3 draft tokens per step.
model:
  model_path: nvidia/Kimi-K2.6-NVFP4
  device_specs: [0, 1, 2, 3, 4, 5, 6, 7]
  data_parallel_degree: 1
  max_length: 262144
  trust_remote_code: true
  kv_cache:
    kv_cache_format: float8_e4m3fn
    device_memory_utilization: 0.75

draft_model:
  model_path: nvidia/Kimi-K2.6-Eagle3
  trust_remote_code: true
  device_specs: [0, 1, 2, 3, 4, 5, 6, 7]
  quantization_encoding: bfloat16
  # Override the draft sliding window (not declared in the K2.6 draft's HF
  # config); matches the K2.6 NVFP4 production deployment.
  sliding_window: 12288
  kv_cache:
    kv_cache_format: float8_e4m3fn

speculative:
  speculative_method: eagle
  num_speculative_tokens: 3

sampling:
  enable_structured_output: true

runtime:
  ep_size: 8
  ep_use_allreduce: true
  max_batch_input_tokens: 4096
