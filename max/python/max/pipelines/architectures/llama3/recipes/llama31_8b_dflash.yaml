model:
  model_path: meta-llama/Llama-3.1-8B-Instruct
  device_specs: [0]
  max_length: 8192
  kv_cache:
    device_memory_utilization: 0.75

draft_model:
  model_path: z-lab/LLaMA3.1-8B-Instruct-DFlash-UltraChat
  device_specs: [0]
  trust_remote_code: true
  quantization_encoding: bfloat16

speculative:
  speculative_method: dflash
  num_speculative_tokens: 9

runtime:
  max_num_steps: 1
  max_batch_input_tokens: 4096
  device_graph_capture: false
